baseURL = "https://www.iops.tech/"
locale = "en-US"
title = "iops.tech"
disqusShortname = "iopstech"

[params]
  author = "Radosław Załuska"
  description = "DevOps Blog by Radosław Załuska"
  googleAnalytics = "G-LFVN3SZ5W2"
  ISO8601 = "2006-01-02T15:04:05CEST"

[permalinks]
	blog = "/blog/:slug/"

[params.social]
    twitter = "iops_tech"

[taxonomies]
tag = "tags"

ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    lineAnchors = ''
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = true
    noClasses = false
    style = 'monokai'
    tabWidth = 4
